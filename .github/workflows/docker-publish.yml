name: Build & Push DockerHub Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" \
            --build-arg VITE_REQUEST_TIMEOUT_MS="${{ vars.VITE_REQUEST_TIMEOUT_MS }}" \
            --build-arg VITE_SESSION_WARNING_SECONDS="${{ vars.VITE_SESSION_WARNING_SECONDS }}" \
            --build-arg VITE_SWITCH_PORTAL_URL="${{ vars.VITE_SWITCH_PORTAL_URL }}" \
            --build-arg VITE_ENABLE_P2P_IDEMPOTENCY="${{ vars.VITE_ENABLE_P2P_IDEMPOTENCY }}" \
            -t andrescarrillo2001/banquito-core-bancaweb-fronend:fix-api-20260621 .

      - name: Push image
        run: |
          docker push andrescarrillo2001/banquito-core-bancaweb-fronend:fix-api-20260621

      - name: Trigger Infra Deploy
        run: |
          curl -f -i -X POST \
            -H "Authorization: Bearer ${{ secrets.DEVOPS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CamilaParedes23/banquito-infra/dispatches \
            -d '{
              "event_type": "deploy-core-front",
              "client_payload": {
                "service": "banca-web"
              }
            }'
