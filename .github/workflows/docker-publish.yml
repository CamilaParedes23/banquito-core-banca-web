name: Build & Push DockerHub Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-fix-api-20260621

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t andrescarrillo2001/banquito-core-bancaweb-fronend:fix-api-20260621 .

      - name: Push image
        run: |
          docker push andrescarrillo2001/banquito-core-bancaweb-fronend:fix-api-20260621

      - name: Trigger Infra Deploy
        run: |
          curl -f -i -X POST \
            -H "Authorization: Bearer ${{ secrets.DEVOPS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CamilaParedes23/banquito-infra/dispatches \
            -d '{
              "event_type": "deploy-core-front",
              "client_payload": {
                "service": "banca-web"
              }
            }'
